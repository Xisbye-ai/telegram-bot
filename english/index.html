<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#FFF3E0">
<title>Английский с Фокси 🦊</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦊</text></svg>">
<style>
/* ══════════ ТОКЕНЫ ══════════ */
:root{
  --bg:#FFF3E0; --card:#FFFFFF; --card2:#FFF9F0; --ink:#473657; --mut:#9B8CAD;
  --line:#F1E3D3; --tile:#FFFDF8;
  --green:#3FC97C; --green-d:#2EA25F; --orange:#FF9F40; --orange-d:#E07E15;
  --coral:#FF6B81; --coral-d:#E14A64; --blue:#4EA3FF; --blue-d:#2C7FDF;
  --purple:#A06BF7; --purple-d:#7F49DD; --gold:#FFC53D; --gold-d:#D99F13;
  --teal:#31C8BC; --teal-d:#1FA69B;
  --ok-bg:#E8FAEF; --bad-bg:#FFECEF;
  --shadow:0 10px 24px -12px rgba(96,58,16,.20);
  --blob1:rgba(255,197,61,.35); --blob2:rgba(255,107,129,.22); --blob3:rgba(78,163,255,.18);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#241D37; --card:#322A4E; --card2:#3A3159; --ink:#F5EFFF; --mut:#A99DC6;
    --line:#453B68; --tile:#3C3360;
    --ok-bg:#1F3A32; --bad-bg:#46283a;
    --shadow:0 12px 26px -12px rgba(0,0,0,.55);
    --blob1:rgba(255,197,61,.10); --blob2:rgba(255,107,129,.10); --blob3:rgba(78,163,255,.10);
  }
}
:root[data-theme="dark"]{
  --bg:#241D37; --card:#322A4E; --card2:#3A3159; --ink:#F5EFFF; --mut:#A99DC6;
  --line:#453B68; --tile:#3C3360;
  --ok-bg:#1F3A32; --bad-bg:#46283a;
  --shadow:0 12px 26px -12px rgba(0,0,0,.55);
  --blob1:rgba(255,197,61,.10); --blob2:rgba(255,107,129,.10); --blob3:rgba(78,163,255,.10);
}
/* ══════════ БАЗА ══════════ */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); min-height:100dvh;
  font-family:ui-rounded,"SF Pro Rounded","Segoe UI",system-ui,-apple-system,Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:16px; line-height:1.45; overflow-x:hidden;
}
body::before,body::after{
  content:""; position:fixed; z-index:0; border-radius:50%; pointer-events:none;
}
body::before{width:420px;height:420px; left:-160px; top:-120px;
  background:radial-gradient(circle at 40% 40%, var(--blob1), transparent 70%);}
body::after{width:520px;height:520px; right:-200px; bottom:-160px;
  background:radial-gradient(circle at 60% 60%, var(--blob2), transparent 70%),
             radial-gradient(circle at 30% 20%, var(--blob3), transparent 60%);}
#app{position:relative; z-index:1; max-width:470px; margin:0 auto;
  padding:14px 16px calc(88px + env(safe-area-inset-bottom)); min-height:100dvh;}
#app.nofoot{padding-bottom:24px}
button{font-family:inherit; color:inherit; border:none; background:none; cursor:pointer; font-size:inherit;
  user-select:none; -webkit-user-select:none}
input{font-family:inherit}
h1,h2,h3{margin:0; text-wrap:balance}
.scr{animation:fadein .25s ease}
@keyframes fadein{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
/* ══════════ ШАПКА ══════════ */
.topbar{display:flex; align-items:center; gap:8px; margin-bottom:14px}
.logo{font-weight:900; font-size:19px; letter-spacing:-.02em; display:flex; align-items:center; gap:7px}
.logo .fx{font-size:26px; filter:drop-shadow(0 2px 2px rgba(0,0,0,.12))}
.spacer{flex:1}
.pill{display:inline-flex; align-items:center; gap:5px; background:var(--card);
  border:2px solid var(--line); border-radius:999px; padding:5px 11px 5px 8px;
  font-weight:800; font-size:14px; box-shadow:var(--shadow); font-variant-numeric:tabular-nums}
.pill.dim{opacity:.55}
/* ══════════ КАРТОЧКИ ══════════ */
.card{background:var(--card); border-radius:24px; padding:18px;
  box-shadow:var(--shadow); border:2px solid var(--line); position:relative}
.eyebrow{font-size:11.5px; font-weight:900; letter-spacing:.12em; text-transform:uppercase;
  color:var(--mut); margin:22px 4px 10px}
/* маскот */
.hero{display:flex; gap:14px; align-items:center}
.fox-wrap{flex:0 0 84px; width:84px; height:84px; border-radius:30px 30px 30px 8px;
  background:linear-gradient(135deg,#FFD98E,#FFAB5E); display:grid; place-items:center;
  box-shadow:inset 0 -4px 0 rgba(0,0,0,.08); transform:rotate(-3deg)}
.fox{font-size:52px; animation:floaty 3.2s ease-in-out infinite; transform-origin:50% 90%}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-5px) rotate(2deg)}}
.bubble{flex:1; background:var(--card2); border:2px solid var(--line); border-radius:18px;
  padding:11px 13px; font-size:14.5px; font-weight:600; position:relative}
.bubble::before{content:""; position:absolute; left:-9px; top:26px; width:14px; height:14px;
  background:var(--card2); border-left:2px solid var(--line); border-bottom:2px solid var(--line);
  transform:rotate(45deg); border-radius:0 0 0 4px}
.lvl-line{display:flex; align-items:center; gap:8px; margin-top:12px; font-weight:800; font-size:13.5px}
.lvl-line .bar{flex:1}
/* прогресс-бары */
.bar{height:14px; border-radius:999px; background:var(--line); overflow:hidden; position:relative}
.bar>i{display:block; height:100%; border-radius:999px;
  background:linear-gradient(90deg,var(--gold),var(--orange)); transition:width .5s cubic-bezier(.22,1,.36,1);
  position:relative; min-width:0}
.bar>i::after{content:""; position:absolute; inset:2px 3px auto 3px; height:4px; border-radius:99px;
  background:rgba(255,255,255,.45)}
.bar.green>i{background:linear-gradient(90deg,#6FE3A5,var(--green))}
.bar.blue>i{background:linear-gradient(90deg,#8CC5FF,var(--blue))}
/* ══════════ КНОПКИ ══════════ */
.bigbtn{display:flex; align-items:center; gap:13px; width:100%; text-align:left;
  border-radius:22px; padding:15px 17px; font-weight:900; font-size:17px; color:#fff;
  border:none; border-bottom:5px solid rgba(0,0,0,.25); box-shadow:var(--shadow);
  transition:transform .08s, border-bottom-width .08s, margin-top .08s}
.bigbtn:active{transform:translateY(4px); border-bottom-width:1px}
.bigbtn .ic{font-size:26px; background:rgba(255,255,255,.25); width:46px; height:46px;
  border-radius:15px; display:grid; place-items:center; flex:0 0 46px}
.bigbtn .sub{display:block; font-size:12.5px; font-weight:700; opacity:.85; margin-top:1px}
.bigbtn .count{margin-left:auto; background:rgba(255,255,255,.3); padding:4px 12px;
  border-radius:999px; font-size:15px; font-variant-numeric:tabular-nums}
.b-green{background:var(--green)} .b-orange{background:var(--orange)}
.b-purple{background:var(--purple)} .b-blue{background:var(--blue)}
.b-coral{background:var(--coral)} .b-teal{background:var(--teal)} .b-gold{background:var(--gold)}
.ghostbtn{display:block; width:100%; text-align:center; padding:13px; border-radius:18px;
  font-weight:900; color:var(--mut); border:2px dashed var(--line); margin-top:10px}
.ghostbtn:active{transform:scale(.98)}
/* темы */
.topic{display:flex; align-items:center; gap:13px; width:100%; text-align:left;
  background:var(--card); border:2px solid var(--line); border-radius:22px; padding:13px 15px;
  box-shadow:var(--shadow); margin-bottom:11px; transition:transform .1s}
.topic:active{transform:scale(.98)}
.topic .emo{width:52px; height:52px; flex:0 0 52px; border-radius:17px; display:grid;
  place-items:center; font-size:28px}
.topic .tt{flex:1; min-width:0}
.topic .tt b{font-size:16px; display:flex; align-items:center; gap:7px}
.topic .tt .bar{margin-top:7px; height:10px}
.topic .num{font-size:12.5px; font-weight:800; color:var(--mut); font-variant-numeric:tabular-nums; white-space:nowrap}
.tag{font-size:10.5px; font-weight:900; letter-spacing:.05em; padding:3px 8px; border-radius:999px;
  background:var(--gold); color:#5c4404; text-transform:uppercase}
.tag.done{background:var(--green); color:#fff}
/* ══════════ ТАББАР ══════════ */
.tabbar{position:fixed; z-index:50; left:50%; transform:translateX(-50%);
  bottom:calc(10px + env(safe-area-inset-bottom)); width:min(440px, calc(100% - 24px));
  background:var(--card); border:2px solid var(--line); border-radius:24px;
  box-shadow:0 14px 30px -10px rgba(60,30,5,.28); display:flex; padding:7px}
.tabbar button{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:7px 2px; border-radius:17px; font-size:20px; color:var(--mut); font-weight:800}
.tabbar button span{font-size:10.5px; letter-spacing:.02em}
.tabbar button.on{background:var(--bg); color:var(--ink)}
.tabbar button:active{transform:scale(.94)}
/* ══════════ СЕССИЯ ══════════ */
.shead{display:flex; align-items:center; gap:12px; margin-bottom:18px}
.x{font-size:20px; color:var(--mut); font-weight:900; padding:6px 10px; border-radius:12px}
.x:active{background:var(--line)}
.shead .bar{flex:1; height:16px}
.sxp{font-weight:900; color:var(--orange); font-size:15px; font-variant-numeric:tabular-nums; white-space:nowrap}
.prompt{font-size:15px; font-weight:800; color:var(--mut); margin:4px 2px 14px}
.bigword{font-size:34px; font-weight:900; letter-spacing:-.01em; display:flex; align-items:center;
  gap:10px; flex-wrap:wrap}
.tr{display:inline-block; background:var(--card2); border:2px solid var(--line);
  padding:4px 12px; border-radius:999px; font-size:14px; font-weight:800; color:var(--mut); margin-top:8px}
.sndbtn{width:46px; height:46px; border-radius:15px; background:var(--blue); color:#fff;
  font-size:21px; border-bottom:4px solid var(--blue-d); flex:0 0 46px}
.sndbtn.mini{width:40px; height:40px; font-size:17px; flex-basis:40px}
.sndbtn.slow{background:var(--teal); border-bottom-color:var(--teal-d)}
.sndbtn:active{transform:translateY(3px); border-bottom-width:1px}
.sndbtn.big{width:96px; height:96px; font-size:44px; border-radius:28px; border-bottom-width:7px; margin:0 auto}
.emo-hero{width:112px; height:112px; margin:6px auto 12px; border-radius:36px; display:grid;
  place-items:center; font-size:64px; animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(.5); opacity:0} to{transform:scale(1); opacity:1}}
.ex-box{background:var(--card2); border:2px solid var(--line); border-radius:16px;
  padding:11px 13px; margin-top:14px; font-size:15px}
.ex-box b{display:flex; align-items:center; gap:8px}
.ex-box .ru{color:var(--mut); font-size:13.5px; font-weight:600; margin-top:2px}
.opts{display:grid; gap:10px; margin-top:16px}
.opts.two{grid-template-columns:1fr 1fr}
.opt{background:var(--card); border:2px solid var(--line); border-bottom-width:5px;
  border-radius:18px; padding:14px 15px; font-size:16.5px; font-weight:800; text-align:center;
  box-shadow:var(--shadow); transition:transform .08s; position:relative}
.opt:active{transform:translateY(3px); border-bottom-width:2px}
.opt .k{position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:10.5px;
  color:var(--mut); border:1.5px solid var(--line); border-radius:6px; width:17px; height:17px;
  line-height:14px; display:none}
@media (hover:hover){.opt .k{display:block}}
.opt.ok{background:var(--green); border-color:var(--green-d); color:#fff; animation:pop .3s}
.opt.bad{background:var(--coral); border-color:var(--coral-d); color:#fff; animation:shake .4s}
.opt.faded{opacity:.45; pointer-events:none}
.opt:disabled{pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}}
/* сборка слова / предложения */
.slots{display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin:18px 0 6px; min-height:52px}
.slot{min-width:40px; height:50px; border-bottom:4px solid var(--line); border-radius:8px;
  display:grid; place-items:center; font-size:24px; font-weight:900; padding:0 6px}
.slot.fill{background:var(--card); border:2px solid var(--line); border-bottom-width:4px;
  box-shadow:var(--shadow); animation:pop .2s}
.pool{display:flex; gap:9px; flex-wrap:wrap; justify-content:center; margin-top:18px}
.tile{background:var(--tile); border:2px solid var(--line); border-bottom-width:5px;
  border-radius:14px; min-width:46px; height:52px; padding:0 13px; font-size:22px; font-weight:900;
  box-shadow:var(--shadow); transition:transform .08s}
.tile:active{transform:translateY(3px)}
.tile.used{opacity:.25; pointer-events:none}
.chipline{display:flex; gap:8px; flex-wrap:wrap; min-height:52px; align-content:flex-start;
  border-bottom:3px dashed var(--line); padding-bottom:10px; margin-top:16px}
.chip{background:var(--card); border:2px solid var(--line); border-bottom-width:4px; border-radius:13px;
  padding:9px 13px; font-weight:800; font-size:16px; animation:pop .2s}
.gapline{font-size:22px; font-weight:800; line-height:1.6; margin:10px 2px}
.gapline .gap{display:inline-block; min-width:64px; border-bottom:4px solid var(--orange);
  border-radius:3px; text-align:center; color:var(--orange); font-weight:900}
/* ══════════ ШТОРКА ОТВЕТА ══════════ */
#sheet{position:fixed; z-index:80; left:50%; transform:translateX(-50%) translateY(110%);
  bottom:0; width:min(470px,100%); transition:transform .28s cubic-bezier(.22,1,.36,1)}
#sheet.show{transform:translateX(-50%) translateY(0)}
.sh-in{margin:0; border-radius:26px 26px 0 0; padding:18px 18px calc(16px + env(safe-area-inset-bottom));
  box-shadow:0 -12px 40px rgba(0,0,0,.18)}
.sh-in.good{background:var(--ok-bg)} .sh-in.bad{background:var(--bad-bg)}
.sh-head{display:flex; align-items:center; gap:10px; font-size:19px; font-weight:900; margin-bottom:4px}
.sh-in.good .sh-head{color:var(--green-d)} .sh-in.bad .sh-head{color:var(--coral-d)}
.sh-body{font-size:15px; font-weight:600; margin-bottom:12px}
.sh-body b{font-size:17px}
.nextbtn{display:block; width:100%; text-align:center; padding:15px; border-radius:18px;
  font-weight:900; font-size:17px; color:#fff; border-bottom:5px solid rgba(0,0,0,.25)}
.nextbtn:active{transform:translateY(3px); border-bottom-width:1px}
.nextbtn.g{background:var(--green)} .nextbtn.r{background:var(--coral)}
/* ══════════ СЛОВАРЬ ══════════ */
.search{width:100%; background:var(--card); border:2px solid var(--line); border-radius:18px;
  padding:13px 16px; font-size:16px; font-weight:700; color:var(--ink); outline:none;
  box-shadow:var(--shadow)}
.search::placeholder{color:var(--mut)}
.fchips{display:flex; gap:8px; overflow-x:auto; padding:12px 2px; scrollbar-width:none}
.fchips::-webkit-scrollbar{display:none}
.fchip{white-space:nowrap; background:var(--card); border:2px solid var(--line); border-radius:999px;
  padding:7px 14px; font-weight:800; font-size:13.5px; color:var(--mut)}
.fchip.on{background:var(--ink); color:var(--bg); border-color:var(--ink)}
.wrow{display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:var(--card);
  border:2px solid var(--line); border-radius:18px; padding:10px 13px; margin-bottom:8px; box-shadow:var(--shadow)}
.wrow:active{transform:scale(.985)}
.wrow .we{font-size:26px; width:40px; text-align:center; flex:0 0 40px}
.wrow .wt{flex:1; min-width:0}
.wrow .wt b{font-size:16px}
.wrow .wt small{display:block; color:var(--mut); font-weight:600; font-size:13px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.stars{font-size:12px; letter-spacing:1px; white-space:nowrap}
/* ══════════ ГРАММАТИКА ══════════ */
.gcard{margin-bottom:14px}
.gcard h3{font-size:17px; display:flex; gap:9px; align-items:center; margin-bottom:8px}
.gx{display:flex; justify-content:space-between; gap:10px; background:var(--card2);
  border:2px solid var(--line); border-radius:13px; padding:8px 12px; margin-top:7px;
  font-size:15px; align-items:center; flex-wrap:wrap}
.gx b{font-weight:900}
.gx span{color:var(--mut); font-size:13.5px; font-weight:600}
.gt{display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:8px}
.gt .c{background:var(--card2); border:2px solid var(--line); border-radius:12px; padding:7px 11px;
  font-weight:800; font-size:14.5px; text-align:center}
.gt .c.hd{background:var(--purple); border-color:var(--purple-d); color:#fff; font-weight:900}
.hl{background:var(--gold); color:#5c4404; border-radius:7px; padding:0 5px; font-weight:900}
.gnote{display:flex; gap:9px; background:var(--ok-bg); border-radius:14px; padding:10px 12px;
  margin-top:10px; font-size:14px; font-weight:600; align-items:flex-start}
.gnote .f{font-size:20px}
/* ══════════ ПРОФИЛЬ / НАГРАДЫ ══════════ */
.statgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px}
.stat{background:var(--card); border:2px solid var(--line); border-radius:18px; padding:12px 8px;
  text-align:center; box-shadow:var(--shadow)}
.stat .v{font-size:21px; font-weight:900; font-variant-numeric:tabular-nums}
.stat .l{font-size:11px; font-weight:800; color:var(--mut); text-transform:uppercase; letter-spacing:.06em}
.achgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.ach{background:var(--card); border:2px solid var(--line); border-radius:18px; padding:13px;
  text-align:center; box-shadow:var(--shadow)}
.ach .ae{font-size:34px; filter:grayscale(1); opacity:.35}
.ach.got .ae{filter:none; opacity:1; animation:pop .4s}
.ach b{display:block; font-size:13.5px; margin-top:4px}
.ach small{color:var(--mut); font-size:11.5px; font-weight:600; line-height:1.3; display:block}
.setrow{display:flex; align-items:center; gap:11px; width:100%; background:var(--card);
  border:2px solid var(--line); border-radius:18px; padding:13px 15px; margin-bottom:9px;
  font-weight:800; box-shadow:var(--shadow); text-align:left}
.setrow .se{font-size:21px}
.setrow .sv{margin-left:auto; color:var(--mut); font-weight:800}
.goalpick{display:flex; gap:8px}
.goalpick button{flex:1; background:var(--card); border:2px solid var(--line); border-radius:14px;
  padding:9px; font-weight:900}
.goalpick button.on{background:var(--gold); border-color:var(--gold-d); color:#5c4404}
/* ══════════ ФИНАЛ УРОКА ══════════ */
.donebox{text-align:center; padding-top:34px}
.donebox .df{font-size:86px; animation:floaty 2.6s ease-in-out infinite; display:inline-block}
.donebox h2{font-size:26px; margin:10px 0 4px}
.donebox p{color:var(--mut); font-weight:700; margin:0 0 18px}
.dstats{display:flex; gap:10px; justify-content:center; margin-bottom:22px}
.dstat{background:var(--card); border:2px solid var(--line); border-radius:18px; padding:11px 18px;
  box-shadow:var(--shadow)}
.dstat .v{font-size:22px; font-weight:900}
.dstat .l{font-size:11px; font-weight:800; color:var(--mut); text-transform:uppercase}
/* конфетти и тосты */
.cf{position:fixed; top:-20px; z-index:100; width:11px; height:11px; border-radius:3px;
  pointer-events:none; animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg)}}
#toast{position:fixed; z-index:120; top:14px; left:50%; transform:translateX(-50%) translateY(calc(-100% - 30px));
  background:var(--ink); color:var(--bg); border-radius:18px; padding:12px 18px; font-weight:800;
  box-shadow:0 14px 30px rgba(0,0,0,.3); transition:transform .35s cubic-bezier(.22,1,.36,1);
  width:max-content; max-width:calc(100% - 30px); font-size:14.5px}
#toast.show{transform:translateX(-50%) translateY(0)}
/* онбординг */
.onb{text-align:center; padding-top:8vh}
.onb .of{font-size:110px; display:inline-block; animation:floaty 3s ease-in-out infinite}
.onb h1{font-size:28px; margin:14px 0 8px; letter-spacing:-.02em}
.onb p{color:var(--mut); font-weight:700; font-size:16.5px; max-width:34ch; margin:0 auto 26px}
.dots{display:flex; gap:7px; justify-content:center; margin-bottom:20px}
.dots i{width:8px; height:8px; border-radius:99px; background:var(--line)}
.dots i.on{background:var(--orange); width:22px}
.confirm-wrap{margin-top:10px}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001s !important; transition-duration:.001s !important}
}

function learnedCount(){let n=0;for(const k in st.words){if(st.words[k].l>=1&&WMAP[k])n++}return n}
function dueList(){const now=Date.now();return ALL.filter(w=>{const s=st.words[w.en];return s&&s.l>=1&&s.l<5&&s.due<=now})}
function topicLearned(t){return t.words.filter(w=>{const s=st.words[w.en];return s&&s.l>=1}).length}
function freshWords(t){return t.words.filter(w=>{const s=st.words[w.en];return!s||s.l<1})}
function touchDay(){const td=dayStr();if(st.dayKey!==td){st.dayKey=td;st.dayXp=0}}
function addXp(n){touchDay();st.xp+=n;st.dayXp+=n}
function bumpStreak(){const td=dayStr();if(st.lastDay===td)return;const y=dayStr(new Date(Date.now()-864e5));st.streak=(st.lastDay===y)?st.streak+1:1;st.lastDay=td}
(function fixStreak(){if(!st.lastDay)return;const td=dayStr(),y=dayStr(new Date(Date.now()-864e5));if(st.lastDay!==td&&st.lastDay!==y){st.streak=0}})();
function levelOf(xp){let i=0;for(let k=0;k<LEVELS.length;k++){if(xp>=LEVELS[k][0])i=k}return i}
function checkAch(){const got=[];ACH.forEach(a=>{if(!st.ach[a.id]&&a.c(st)){st.ach[a.id]=Date.now();got.push(a)}});
  if(got.length){let d=400;got.forEach(a=>{setTimeout(()=>toast(a.e+' Награда: «'+a.n+'»!'),d);d+=1600})}}

let VOICE=null;
function pickVoice(){try{const vs=speechSynthesis.getVoices().filter(v=>v.lang&&v.lang.toLowerCase().startsWith('en'));
  VOICE=vs.find(v=>/Google US English/i.test(v.name))||vs.find(v=>/Samantha|Aria|Zira|Jenny/i.test(v.name))||vs.find(v=>v.lang==='en-US')||vs[0]||null}catch(e){}}
if('speechSynthesis' in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice}
function say(text,slow){if(!('speechSynthesis' in window))return;try{speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-US';if(VOICE)u.voice=VOICE;u.rate=slow?0.55:0.92;u.pitch=1.03;speechSynthesis.speak(u)}catch(e){}}
const hasTTS=('speechSynthesis' in window);
let AC=null;
function sfx(kind){if(!st.sound)return;try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended')AC.resume();const t=AC.currentTime;
  const seq=kind==='ok'?[[523.25,0],[659.25,.09],[783.99,.18]]:kind==='win'?[[523.25,0],[659.25,.12],[783.99,.24],[1046.5,.36],[1318.5,.48]]:[[220,0],[174.6,.13]];
  seq.forEach(p=>{const o=AC.createOscillator(),g=AC.createGain();o.type=kind==='bad'?'triangle':'sine';o.frequency.value=p[0];
    g.gain.setValueAtTime(.0001,t+p[1]);g.gain.exponentialRampToValueAtTime(kind==='bad'?.08:.14,t+p[1]+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+p[1]+.3);o.connect(g);g.connect(AC.destination);o.start(t+p[1]);o.stop(t+p[1]+.32)})}catch(e){}}

function confetti(){const cols=['#FF6B81','#FFC53D','#3FC97C','#4EA3FF','#A06BF7','#31C8BC'];
  for(let i=0;i<56;i++){const c=document.createElement('div');c.className='cf';
    c.style.left=Math.random()*100+'vw';c.style.background=rnd(cols);
    c.style.width=c.style.height=(7+Math.random()*8)+'px';
    c.style.borderRadius=Math.random()>.5?'50%':'3px';
    c.style.animationDuration=(1.6+Math.random()*1.6)+'s';
    c.style.animationDelay=(Math.random()*.5)+'s';
    document.body.appendChild(c);setTimeout(()=>c.remove(),3600)}}
let toastT=null;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400)}

/* ═══════════════ СЕССИЯ УПРАЖНЕНИЙ ═══════════════ */
let S=null;
function canSpell(w){return /^[a-z]{2,9}$/.test(w.en)}
function makeOpts(w,f){const pool=shuffle(ALL.filter(o=>o.en!==w.en&&o.ru!==w.ru&&o.tr!==w.tr));
  const same=pool.filter(o=>o.topic===w.topic).slice(0,2);
  const rest=pool.filter(o=>same.indexOf(o)<0);
  return shuffle([w].concat(same.concat(rest).slice(0,3)))}
function wordTasks(w,hard){const t=[];
  t.push({k:'e2r',w,o:makeOpts(w,'ru')});
  t.push({k:'r2e',w,o:makeOpts(w,'en')});
  if(hard&&canSpell(w))t.push({k:'spell',w});
  else if(hasTTS)t.push({k:'listen',w,o:makeOpts(w,'en')});
  else t.push({k:'e2r',w,o:makeOpts(w,'ru')});
  return t}
function noAdjacent(tasks){for(let p=0;p<3;p++){for(let i=1;i<tasks.length;i++){
  if(tasks[i].w&&tasks[i-1].w&&tasks[i].w.en===tasks[i-1].w.en){
    const j=tasks.findIndex((t,k)=>k>i&&(!t.w||t.w.en!==tasks[i-1].w.en));
    if(j>0){const tmp=tasks[i];tasks[i]=tasks[j];tasks[j]=tmp}}}}return tasks}
function startLesson(topic){const fresh=freshWords(topic).slice(0,5);if(!fresh.length)return startTraining(topic);
  let ex=[];fresh.forEach(w=>{ex=ex.concat(wordTasks(w,Math.random()>.5))});
  const queue=fresh.map(w=>({k:'intro',w})).concat(noAdjacent(shuffle(ex)));
  S={mode:'lesson',topic,words:fresh,queue,i:0,wrong:{},earned:0,ft:0,tasks:0};renderTask()}
function startReview(){const due=shuffle(dueList()).slice(0,8);if(!due.length)return;
  let ex=[];due.forEach(w=>{const s=ws(w.en);ex=ex.concat(shuffle(wordTasks(w,s.l>=2)).slice(0,2))});
  S={mode:'review',words:due,queue:noAdjacent(shuffle(ex)),i:0,wrong:{},earned:0,ft:0,tasks:0};renderTask()}
function startTraining(topic){const pool=(topic?topic.words:ALL).filter(w=>{const s=st.words[w.en];return s&&s.l>=1});
  const pick=shuffle(pool).slice(0,6);if(!pick.length){toast('Сначала выучи несколько слов! 🌱');return}
  let ex=[];pick.forEach(w=>{ex=ex.concat(shuffle(wordTasks(w,Math.random()>.4)).slice(0,2))});
  S={mode:'train',topic,words:pick,queue:noAdjacent(shuffle(ex)),i:0,wrong:{},earned:0,ft:0,tasks:0};renderTask()}
function startGrammarQuiz(g){const queue=g.quiz.map(q=>Object.assign({},q,{k:q.t==='build'?'build':q.t==='gap'?'gap':'pick'}));
  S={mode:'gram',g,words:[],queue,i:0,wrong:{},earned:0,ft:0,tasks:0};renderTask()}

function sHead(){const pct=Math.min(100,Math.round(S.i/S.queue.length*100));
  return `<div class="shead"><button class="x" id="sQuit">✕</button>
  <div class="bar"><i style="width:${pct}%"></i></div><div class="sxp">⭐ ${S.earned}</div></div>`}
function bindHead(){$('#sQuit').addEventListener('click',()=>{if('speechSynthesis' in window)try{speechSynthesis.cancel()}catch(e){};
  if(S&&S.mode==='gram'){const gid=S.g.id;S=null;renderGramLesson(gid)}else{S=null;renderTab()}})}
function sndBtns(w,big){return `<div style="display:flex;gap:9px;justify-content:center;margin-top:14px">
  <button class="sndbtn ${big?'big':''}" id="sndN">🔊</button><button class="sndbtn slow ${big?'big':''}" id="sndS">🐢</button></div>`}
function bindSnd(text){const n=$('#sndN'),s=$('#sndS');if(n)n.addEventListener('click',()=>say(text));if(s)s.addEventListener('click',()=>say(text,true))}

function renderTask(){APP.classList.add('nofoot');closeSheet();
  if(S.i>=S.queue.length)return complete();
  const t=S.queue[S.i];
  if(t.k==='intro')return rIntro(t);
  if(t.k==='e2r')return rChoice(t,'Как переводится это слово?',true);
  if(t.k==='r2e')return rChoice(t,'Выбери перевод на английский',false);
  if(t.k==='listen')return rListen(t);
  if(t.k==='spell')return rSpell(t);
  if(t.k==='gap')return rGap(t);
  if(t.k==='pick')return rPick(t);
  if(t.k==='build')return rBuild(t)}

function rIntro(t){const w=t.w;const idx=S.words.indexOf(w)+1;
  APP.innerHTML=`<div class="scr">${sHead()}<div class="prompt">✨ Новое слово ${idx} из ${S.words.length}</div>
  <div class="card" style="text-align:center">
    <div class="emo-hero" style="background:${w.color}22">${w.e}</div>
    <div class="bigword" style="justify-content:center">${esc(w.en)}</div>
    <div class="tr">[ ${esc(w.tr)} ]</div>
    <div style="font-size:20px;font-weight:800;margin-top:10px">${esc(w.ru)}</div>
    ${sndBtns(w)}
    <div class="ex-box" style="text-align:left"><b>💬 ${esc(w.ex)}</b><div class="ru">${esc(w.exRu)}</div></div></div>
  <button class="bigbtn b-green" id="iNext" style="margin-top:16px"><span class="ic">👍</span>Запомнил, дальше!</button></div>`;
  bindHead();bindSnd(w.en);say(w.en);
  $('#iNext').addEventListener('click',()=>{S.i++;renderTask()})}

function optHTML(list,f){return `<div class="opts">${list.map((o,i)=>
  `<button class="opt" data-i="${i}"><span class="k">${i+1}</span>${esc(f?o.ru:o.en)}</button>`).join('')}</div>`}
function bindOpts(t,list,field,after){document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
  const i=+b.dataset.i;const okI=list.indexOf(t.w);const ok=i===okI;
  document.querySelectorAll('.opt').forEach((x,xi)=>{x.disabled=true;
    if(xi===okI)x.classList.add('ok');else if(xi===i)x.classList.add(ok?'ok':'bad');else x.classList.add('faded')});
  answer(t,ok,after)}))}

function rChoice(t,label,e2r){const w=t.w;
  APP.innerHTML=`<div class="scr">${sHead()}<div class="prompt">${e2r?'🧐':'🇬🇧'} ${label}</div>
  <div class="card" style="text-align:center">
    ${e2r?`<div class="bigword" style="justify-content:center">${esc(w.en)} <button class="sndbtn mini" id="sndN">🔊</button></div><div class="tr">[ ${esc(w.tr)} ]</div>`
        :`<div class="emo-hero" style="background:${w.color}22;width:84px;height:84px;font-size:46px;border-radius:26px">${w.e}</div><div class="bigword" style="justify-content:center">${esc(w.ru)}</div>`}
  </div>${optHTML(t.o,e2r)}</div>`;
  bindHead();if(e2r){bindSnd(w.en);say(w.en)}
  bindOpts(t,t.o,e2r)}

function rListen(t){const w=t.w;
  APP.innerHTML=`<div class="scr">${sHead()}<div class="prompt">🎧 Послушай. Что это за слово?</div>
  <div class="card" style="text-align:center">${sndBtns(w,true)}
  <div style="color:var(--mut);font-weight:700;font-size:13px;margin-top:10px">🐢 — медленно</div></div>
  ${optHTML(t.o,false)}</div>`;
  bindHead();bindSnd(w.en);setTimeout(()=>say(w.en),300);
  bindOpts(t,t.o,false)}

function rSpell(t){const w=t.w;const letters=shuffle(w.en.split(''));let cur=[];
  APP.innerHTML=`<div class="scr">${sHead()}<div class="prompt">🧩 Собери слово по буквам</div>
  <div class="card" style="text-align:center">
    <div class="emo-hero" style="background:${w.color}22;width:84px;height:84px;font-size:46px;border-radius:26px">${w.e}</div>
    <div style="font-size:20px;font-weight:800">${esc(w.ru)}</div>
    <div class="slots" id="slots">${w.en.split('').map(()=>`<div class="slot"></div>`).join('')}</div>
    <div class="pool" id="pool">${letters.map((L,i)=>`<button class="tile" data-i="${i}">${L}</button>`).join('')}</div></div></div>`;
  bindHead();
  const slots=[...document.querySelectorAll('.slot')];
  const tiles=[...document.querySelectorAll('.tile')];
  function sync(){slots.forEach((s,i)=>{s.textContent=cur[i]?cur[i].L:'';s.classList.toggle('fill',!!cur[i])})}
  tiles.forEach(tl=>tl.addEventListener('click',()=>{if(cur.length>=slots.length||SHEET.classList.contains('show'))return;
    cur.push({L:tl.textContent,tl});tl.classList.add('used');sync();
    if(cur.length===slots.length){const word=cur.map(c=>c.L).join('');const ok=word===w.en;
      if(!ok){setTimeout(()=>{cur.forEach(c=>c.tl.classList.remove('used'));cur=[];sync()},900)}
      answer(t,ok)}}));
  document.getElementById('slots').addEventListener('click',ev=>{const i=slots.indexOf(ev.target);
    if(i<0||!cur[i]||cur.length===slots.length||SHEET.classList.contains('show'))return;
    cur[i].tl.classList.remove('used');cur.splice(i,1);sync()})}

function bindPlain(t,after){document.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
  const i=+b.dataset.i;const ok=i===t.a;
  document.querySelectorAll('.opt').forEach((x,xi)=>{x.disabled=true;
    if(xi===t.a)x.classList.add('ok');else if(xi===i)x.classList.add(ok?'ok':'bad');else x.classList.add('faded')});
  answer(t,ok,after)}))}
function rGap(t){APP.innerHTML=`<div class="scr">${sHead()}<div class="prompt">✏️ Заполни пропуск</div>
  <div class="card"><div class="gapline">${esc(t.q).replace('___','<span class="gap">___</span>')}</div>
  ${t.ru?`<div style="color:var(--mut);font-weight:700;font-size:14px">${esc(t.ru)}</div>`:''}</div>
  <div class="opts ${t.o.length>2?'':'two'}">${t.o.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${i+1}</span>${esc(o)}</button>`).join('')}</div></div>`;
  bindHead();bindPlain(t)}
function rPick(t){APP.innerHTML=`<div class="scr">${sHead()}<div class="prompt">🤔 Выбери правильный вариант</div>
  <div class="card"><div style="font-size:20px;font-weight:800">${esc(t.q)}</div></div>
  <div class="opts">${t.o.map((o,i)=>`<button class="opt" data-i="${i}"><span class="k">${i+1}</span>${esc(o)}</button>`).join('')}</div></div>`;
  bindHead();bindPlain(t)}
function rBuild(t){const tiles=shuffle(t.w.concat(t.x||[]));let cur=[];
  APP.innerHTML=`<div class="scr">${sHead()}<div class="prompt">🧱 Собери предложение</div>
  <div class="card"><div style="font-size:19px;font-weight:800">«${esc(t.ru)}»</div>
  <div class="chipline" id="line"></div>
  <div class="pool">${tiles.map((wd,i)=>`<button class="tile" style="font-size:17px" data-i="${i}">${esc(wd)}</button>`).join('')}</div></div></div>`;
  bindHead();const line=document.getElementById('line');
  const tls=[...document.querySelectorAll('.tile')];
  function sync(){line.innerHTML=cur.map((c,i)=>`<button class="chip" data-c="${i}">${esc(c.wd)}</button>`).join('');
    line.querySelectorAll('.chip').forEach(ch=>ch.addEventListener('click',()=>{if(SHEET.classList.contains('show'))return;
      const i=+ch.dataset.c;cur[i].tl.classList.remove('used');cur.splice(i,1);sync()}))}
  tls.forEach(tl=>tl.addEventListener('click',()=>{if(cur.length>=t.w.length||SHEET.classList.contains('show'))return;
    cur.push({wd:tl.textContent,tl});tl.classList.add('used');sync();
    if(cur.length===t.w.length){const ok=cur.map(c=>c.wd).join(' ')===t.w.join(' ');
      if(!ok){setTimeout(()=>{cur.forEach(c=>c.tl.classList.remove('used'));cur=[];sync()},900)}
      answer(t,ok)}}))}

/* ═══ ответ + шторка ═══ */
function isWord(v){return v&&!Array.isArray(v)}
function answer(t,ok){S.tasks++;st.stats.answers++;
  const first=!t.retry&&!t.failed;
  if(ok){st.stats.correct++;const gain=first?10:5;S.earned+=gain;addXp(gain);if(first)S.ft++;sfx('ok')}
  else{t.failed=true;S.wrong[isWord(t.w)?t.w.en:'#g'+S.i]=1;
    const copy=Object.assign({},t,{retry:true,failed:false});S.queue.push(copy);sfx('bad')}
  save();openSheet(ok,t)}
function openSheet(ok,t){
  const w=isWord(t.w)?t.w:null;
  let body='';
  if(w)body=`${w.e} <b>${esc(w.en)}</b> <span style="color:var(--mut)">[${esc(w.tr)}]</span> — ${esc(w.ru)}`;
  else if(t.k==='build')body=`<b>${esc(t.w.join(' '))}</b> — ${esc(t.ru)}`;
  else if(t.k==='gap')body=`<b>${esc(t.q.replace('___',t.o[t.a]))}</b>${t.ru?' — '+esc(t.ru):''}`;
  else body=`<b>${esc(t.o[t.a])}</b>`;
  const hint=(!ok&&t.hint)?`<div style="margin-top:6px">💡 ${esc(t.hint)}</div>`:'';
  SHEET.innerHTML=`<div class="sh-in ${ok?'good':'bad'}">
    <div class="sh-head">${ok?'🎉 '+rnd(PRAISE):'🦊 '+rnd(CHEER)}</div>
    <div class="sh-body">${ok?body:'Правильно: '+body}${hint}${ok?'':'<div style="margin-top:6px;font-size:13px">Это задание вернётся в конце урока 😉</div>'}</div>
    <button class="nextbtn ${ok?'g':'r'}" id="shNext">Дальше</button></div>`;
  SHEET.classList.add('show');
  if(w&&(t.k==='r2e'||t.k==='spell'||(!ok)))say(w.en);
  $('#shNext').addEventListener('click',()=>{closeSheet();S.i++;renderTask()})}
function closeSheet(){SHEET.classList.remove('show')}

/* ═══ завершение ═══ */
function complete(){const now=Date.now();
  if(S.mode==='lesson'){S.words.forEach(w=>{const s=ws(w.en);if(s.l<1){s.l=1;s.due=now+IVL[1]}});addXp(20);S.earned+=20}
  if(S.mode==='review'){S.words.forEach(w=>{const s=ws(w.en);
    if(S.wrong[w.en]){s.l=Math.max(1,s.l-1);s.due=now+10*60e3}
    else{s.l=Math.min(5,s.l+1);s.due=now+IVL[Math.min(5,s.l)]}});st.stats.reviews++;addXp(15);S.earned+=15}
  if(S.mode==='train'){addXp(10);S.earned+=10}
  if(S.mode==='gram'){st.gram[S.g.id]=Date.now();addXp(30);S.earned+=30}
  const perfect=Object.keys(S.wrong).length===0;
  if(perfect&&S.mode!=='train')st.stats.perfect++;
  st.stats.sessions++;bumpStreak();save();checkAch();save();
  const acc=S.tasks?Math.round(S.ft/S.tasks*100):100;
  const goalHit=st.dayXp>=st.goal;
  const titles={lesson:'Урок пройден!',review:'Повторение — сила!',train:'Отличная тренировка!',gram:'Правило освоено!'};
  const fin=S;S=null;
  APP.innerHTML=`<div class="scr donebox"><div class="df">${perfect?'🤩':'🦊'}</div>
    <h2>${titles[fin.mode]}</h2>
    <p>${perfect?'Ни одной ошибки — ты звезда! ⭐':'Ошибки повторили — теперь запомнится!'}</p>
    <div class="dstats"><div class="dstat"><div class="v" style="color:var(--orange)">+${fin.earned}</div><div class="l">опыта</div></div>
    <div class="dstat"><div class="v" style="color:var(--green)">${acc}%</div><div class="l">точность</div></div>
    <div class="dstat"><div class="v">🔥 ${st.streak}</div><div class="l">стрик</div></div></div>
    ${goalHit?'<div class="card" style="margin-bottom:14px">🎯 <b>Цель дня выполнена!</b> Фокси гордится тобой!</div>':''}
    ${fin.mode==='lesson'&&freshWords(fin.topic).length?`<button class="bigbtn b-green" id="more"><span class="ic">📚</span>Ещё ${Math.min(5,freshWords(fin.topic).length)} новых слов</button>`:''}
    ${fin.mode==='review'&&dueList().length?`<button class="bigbtn b-orange" id="moreRev"><span class="ic">🔁</span>Повторить ещё<span class="count">${dueList().length}</span></button>`:''}
    <button class="ghostbtn" id="goHome">На главную</button></div>`;
  confetti();sfx('win');window.scrollTo(0,0);
  const m=$('#more');if(m)m.addEventListener('click',()=>startLesson(fin.topic));
  const mr=$('#moreRev');if(mr)mr.addEventListener('click',startReview);
  $('#goHome').addEventListener('click',()=>{TAB='home';renderTab()})}

/* ═══════════════ ОНБОРДИНГ ═══════════════ */
const ONB=[['🦊','Привет! Я Фокси','Твой личный тренер английского. Научу с нуля — легко, весело и без скуки!'],
['🧠','Учись, как советует наука','Интервальные повторения, картинки-ассоциации и живые примеры: слова запомнятся сами.'],
['🔥','Всего 5 минут в день','Копи стрик, зарабатывай XP и открывай награды. Маленькие шаги — большие результаты!']];
function renderOnb(step){const o=ONB[step];APP.classList.add('nofoot');
  APP.innerHTML=`<div class="scr onb"><div class="of">${o[0]}</div><h1>${o[1]}</h1><p>${o[2]}</p>
  <div class="dots">${ONB.map((x,i)=>`<i class="${i===step?'on':''}"></i>`).join('')}</div>
  <button class="bigbtn b-green" id="onbN" style="max-width:280px;margin:0 auto"><span class="ic">${step<2?'👉':'🚀'}</span>${step<2?'Дальше':'Поехали!'}</button>
  ${step<2?'<button class="ghostbtn" id="onbS" style="max-width:280px;margin:12px auto 0">Пропустить</button>':''}</div>`;
  $('#onbN').addEventListener('click',()=>{if(step<2)renderOnb(step+1);else{st.onb=true;save();renderTab()}});
  const sk=$('#onbS');if(sk)sk.addEventListener('click',()=>{st.onb=true;save();renderTab()})}

/* ═══════════════ КЛАВИАТУРА + СТАРТ ═══════════════ */
document.addEventListener('keydown',e=>{
  if(e.target&&e.target.tagName==='INPUT')return;
  if(e.key>='1'&&e.key<='9'){const o=document.querySelectorAll('.opt')[+e.key-1];if(o&&!o.disabled){o.click();return}}
  if(e.key==='Enter'){const n=$('#shNext')||$('#iNext')||$('#onbN')||$('#gquiz');if(n){n.click();e.preventDefault()}}});
window.addEventListener('beforeunload',save);
window.__foxy={get S(){return S},get st(){return st},ALL,WMAP,TOPICS,GRAMMAR};

if(!st.onb)renderOnb(0);else renderTab();
</script>
</body>
